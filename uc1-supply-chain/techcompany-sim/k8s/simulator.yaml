---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: techcompany-sim

---
# UC1 — Supply Chain Disruption Response Agent
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sim-uc1
  namespace: techcompany-sim
  labels:
    app: sim-uc1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sim-uc1
  template:
    metadata:
      labels:
        app: sim-uc1
    spec:
      containers:
        - name: sim-uc1
          image: <ECR_REPO>/techcompany-sim-uc1:latest
          command: ["sim-uc1"]
          args:
            - "--port=8001"
            - "--anomaly-delay=120"
            - "--anomaly-intensity=moderate"
            - "--seed=42"
          ports:
            - containerPort: 8001
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: techcompany-sim-uc1
  namespace: techcompany-sim
spec:
  selector:
    app: sim-uc1
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
