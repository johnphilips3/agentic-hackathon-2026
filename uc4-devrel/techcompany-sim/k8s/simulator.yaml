---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: techcompany-sim

---
# UC4 — Developer Relations Insights Agent
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sim-uc4
  namespace: techcompany-sim
  labels:
    app: sim-uc4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sim-uc4
  template:
    metadata:
      labels:
        app: sim-uc4
    spec:
      containers:
        - name: sim-uc4
          image: <ECR_REPO>/techcompany-sim-uc4:latest
          command: ["sim-uc4"]
          args:
            - "--port=8004"
            - "--anomaly-delay=120"
            - "--anomaly-intensity=moderate"
            - "--seed=42"
          ports:
            - containerPort: 8004
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: techcompany-sim-uc4
  namespace: techcompany-sim
spec:
  selector:
    app: sim-uc4
  ports:
    - port: 8004
      targetPort: 8004
  type: ClusterIP
